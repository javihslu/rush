volumes:
  rush_postgres_data:
    driver: local
  airflow_postgres_data:
    driver: local
  airflow_logs:
    driver: local
  app_venv:
    driver: local

x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    GOOGLE_APPLICATION_CREDENTIALS: /gcp/credentials.json
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: google-cloud-platform://?extra__google_cloud_platform__key_path=%2Fgcp%2Fcredentials.json&extra__google_cloud_platform__project=${GCP_PROJECT_ID:-}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    GCP_BUCKET_NAME: ${GCP_BUCKET_NAME:-}
  volumes:
    - .:/app
    - app_venv:/app/.venv
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/credentials.json:ro
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy

services:
  dev:
    build: .
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/credentials.json
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_BUCKET_NAME: ${GCP_BUCKET_NAME:-}
    volumes:
      - .:/app
      - app_venv:/app/.venv
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/credentials.json:ro
    depends_on:
      pgdatabase:
        condition: service_healthy
    stdin_open: true
    tty: true

  pgdatabase:
    image: postgres:18
    env_file: .env
    volumes:
      - rush_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    env_file: .env
    ports:
      - "8085:80"
    environment:
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
    entrypoint: >
      /bin/sh -c " echo $${POSTGRES_HOST:-pgdatabase}:$${POSTGRES_PORT:-5432}:$${POSTGRES_DB:-rush}:$${POSTGRES_USER:-root}:$${POSTGRES_PASSWORD:-root} > /tmp/pgpassfile && chmod 600 /tmp/pgpassfile && echo '{\"Servers\":{\"1\":{\"Name\":\"'$${POSTGRES_DB:-rush}'\",\"Group\":\"Servers\",\"Host\":\"'$${POSTGRES_HOST:-pgdatabase}'\",\"Port\":'$${POSTGRES_PORT:-5432}',\"MaintenanceDB\":\"'$${POSTGRES_DB:-rush}'\",\"Username\":\"'$${POSTGRES_USER:-root}'\",\"SSLMode\":\"prefer\",\"PassFile\":\"/tmp/pgpassfile\"}}}' > /tmp/servers.json && /entrypoint.sh "
    depends_on:
      pgdatabase:
        condition: service_healthy

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username $${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
          --password $${_AIRFLOW_WWW_USER_PASSWORD:-airflow} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        airflow connections delete google_cloud_default 2>/dev/null || true
        airflow connections add google_cloud_default \
          --conn-type google_cloud_platform \
          --conn-extra "{\"key_path\": \"/gcp/credentials.json\", \"project_id\": \"$${GCP_PROJECT_ID}\"}"
        airflow variables set GCP_PROJECT_ID "$${GCP_PROJECT_ID}" 2>/dev/null || true
        airflow variables set GCP_BUCKET_NAME "$${GCP_BUCKET_NAME}" 2>/dev/null || true
        airflow variables set GCP_REGION "europe-west6" 2>/dev/null || true
        airflow variables set BQ_DATASET "rush" 2>/dev/null || true
        airflow variables set BQ_TRANSPORT_RAW_DATASET "transport_raw" 2>/dev/null || true
        airflow variables set BQ_WEATHER_RAW_DATASET "weather_raw" 2>/dev/null || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    depends_on:
      <<: *airflow-common-depends-on

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: [ "CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\"" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
