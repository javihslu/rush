volumes:
  rush_postgres_data:
    driver: local

services:
  dev:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      pgdatabase:
        condition: service_healthy
    stdin_open: true
    tty: true

  pgdatabase:
    image: postgres:18
    env_file: .env
    volumes:
      - rush_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    env_file: .env
    ports:
      - "${PGADMIN_PORT_HOST:-8085}:80"
    depends_on:
      pgdatabase:
        condition: service_healthy
