id: transport_ingestion
namespace: rush
description: |
  Fetches live SBB/CFF departure data from transport.opendata.ch and loads
  it into PostgreSQL (transport_raw.departures) using dlt.
  Runs every hour to build up a historical dataset of departures and delays.

labels:
  layer: ingestion
  source: sbb

tasks:
  - id: ingest
    type: io.kestra.plugin.scripts.shell.Commands
    runner: DOCKER
    docker:
      image: rush-dev
      networkMode: rush_default
        - /Users/gabriel/rush:/code
    commands:
      - /app/.venv/bin/python /app/pipelines/ingestion/transport.py

triggers:
  - id: hourly_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 * * * *"
