name: rush
version: "1.0.0"

require-dbt-version: [">=1.7.0", "<2.0.0"]

profile: rush

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
